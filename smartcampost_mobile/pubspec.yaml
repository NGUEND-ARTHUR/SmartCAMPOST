name: smartcampost_mobile
description: "SmartCAMPOST — Mobile postal logistics platform for Cameroon"
publish_to: 'none'
version: 1.0.2+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2
  shared_preferences: ^2.3.3

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Navigation
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  intl: ^0.20.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Camera & Image
  image_picker: ^1.1.2

  # Local storage
  flutter_secure_storage: ^9.2.3

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Utilities
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  permission_handler: ^11.3.1
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/i18n/
