appId: com.smartcampost.mobile
---
# Guest — Forgot password screen navigation and form
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Navigate to forgot password
- tapOn: "Forgot password?"
- waitForAnimationToEnd
- takeScreenshot: "00_guest_04_forgot_password_screen"

# Phone field should be present
- assertVisible: "Phone number"

# --- Test: Submit empty ---
- tapOn: "Send OTP"
- waitForAnimationToEnd
- takeScreenshot: "00_guest_04_forgot_empty"

# --- Test: Enter valid phone ---
- tapOn: "Phone number"
- inputText: "+237699000001"
- tapOn: "Send OTP"
- waitForAnimationToEnd
- takeScreenshot: "00_guest_04_otp_sent"
# OTP sent — either OTP field appears or success message

# --- Test: Go back ---
- pressKey: back
- waitForAnimationToEnd
- assertVisible: "Login"
- assertVisible: "SmartCAMPOST"
