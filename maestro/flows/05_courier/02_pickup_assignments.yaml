appId: com.smartcampost.mobile
---
# COURIER — Pickup assignments: view assigned pickups, interact
- launchApp:
    clearState: true
- waitForAnimationToEnd

- tapOn: "Phone number"
- inputText: "+237699000004"
- tapOn: "Password"
- inputText: "Test123!Courier"
- tapOn: "Login"
- waitForAnimationToEnd
- assertVisible: "Courier Dashboard"

# Navigate to Pickups
- tapOn: "Pickups"
- waitForAnimationToEnd
- takeScreenshot: "05_courier_02_pickups"

# Pickups screen
- assertVisible: "Assigned Pickups"
# Empty state or list
- assertVisible:
    text: "No pickups assigned"
    optional: true

# If pickups exist, try to interact
- tapOn:
    text: "Accept"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "05_courier_02_pickup_accepted"
- pressKey: back
- waitForAnimationToEnd

# Go back
- pressKey: back
- waitForAnimationToEnd
- assertVisible: "Courier Dashboard"
