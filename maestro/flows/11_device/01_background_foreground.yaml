appId: com.smartcampost.mobile
---
# DEVICE — Background/foreground behavior: app restores state correctly
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login as CLIENT
- tapOn: "Phone number"
- inputText: "+237699000001"
- tapOn: "Password"
- inputText: "Test123!Client"
- tapOn: "Login"
- waitForAnimationToEnd
- assertVisible: "Dashboard"

# Navigate to My Parcels
- tapOn: "My Parcels"
- waitForAnimationToEnd
- assertVisible: "My Parcels"
- takeScreenshot: "11_device_01_on_parcels"

# Test 1: Background while on parcels screen
- pressKey: home
- sleep: 2000
- launchApp
- waitForAnimationToEnd
- takeScreenshot: "11_device_01_restored_from_background"
# App should restore to either parcels screen or dashboard

# Test 2: Background for longer period
- pressKey: home
- sleep: 5000
- launchApp
- waitForAnimationToEnd
- takeScreenshot: "11_device_01_long_background"
# Still authenticated
- assertNotVisible: "Login"

# Test 3: Background from deep page
- tapOn:
    text: "My Parcels"
    optional: true
- waitForAnimationToEnd
- pressKey: home
- sleep: 3000
- launchApp
- waitForAnimationToEnd
- takeScreenshot: "11_device_01_deep_background_restore"
