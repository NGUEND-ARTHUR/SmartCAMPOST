appId: com.smartcampost.mobile
---
# AGENT — Parcel validation: view pending parcels, validate & lock flow
- launchApp:
    clearState: true
- waitForAnimationToEnd

- tapOn: "Phone number"
- inputText: "+237699000003"
- tapOn: "Password"
- inputText: "Test123!Agent"
- tapOn: "Login"
- waitForAnimationToEnd
- assertVisible: "Agent Dashboard"

# Navigate to Validate Parcels
- tapOn: "Validate Parcels"
- waitForAnimationToEnd
- takeScreenshot: "03_agent_03_validation_screen"

# Validation screen content
- assertVisible: "Validate Parcels"
# Either list or empty state
- assertVisible:
    text: "No parcels pending validation"
    optional: true

# If parcels exist, try to validate first one
- tapOn:
    text: "Validate"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "03_agent_03_validate_action"
- pressKey: back
- waitForAnimationToEnd

# Go back to dashboard
- pressKey: back
- waitForAnimationToEnd
- assertVisible: "Agent Dashboard"
