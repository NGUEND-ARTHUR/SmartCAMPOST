appId: com.smartcampost.mobile
---
# WORKFLOW — CLIENT creates parcel → views parcel → tracks parcel
# Full client-side parcel lifecycle
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login as CLIENT
- tapOn: "Phone number"
- inputText: "+237699000001"
- tapOn: "Password"
- inputText: "Test123!Client"
- tapOn: "Login"
- waitForAnimationToEnd
- assertVisible: "Dashboard"
- takeScreenshot: "09_wf_02_client_dashboard"

# Step 1: Navigate to My Parcels (view existing)
- tapOn: "My Parcels"
- waitForAnimationToEnd
- assertVisible: "My Parcels"
- takeScreenshot: "09_wf_02_parcel_list"

# Step 2: Try to create a new parcel
- pressKey: back
- waitForAnimationToEnd
- tapOn: "Create Parcel"
- waitForAnimationToEnd
- assertVisible: "Weight (kg)"
- takeScreenshot: "09_wf_02_create_form"

# Fill minimal required fields
- tapOn: "Weight (kg)"
- inputText: "1.5"
- scroll
- waitForAnimationToEnd
- tapOn:
    text: "Description"
    optional: true
- inputText: "E2E lifecycle test parcel"

# Attempt submission (may fail without addresses — that's OK)
- tapOn: "Create"
- waitForAnimationToEnd
- takeScreenshot: "09_wf_02_after_create_attempt"
# Either success message or validation error (not a crash)

# Step 3: Navigate to Track Parcel
- pressKey: back
- waitForAnimationToEnd
- tapOn: "Track Parcel"
- waitForAnimationToEnd
- assertVisible: "Track Parcel"
- takeScreenshot: "09_wf_02_track_screen"

# Enter a known tracking ref (may be from seeded data)
- tapOn: "Enter tracking number"
- inputText: "CP0000000001"
- tapOn: "Track"
- waitForAnimationToEnd
- takeScreenshot: "09_wf_02_track_result"
# Either parcel details or "not found" — not crash

# Step 4: Scroll result
- scroll
- waitForAnimationToEnd
- takeScreenshot: "09_wf_02_track_scrolled"
