name: Playwright E2E (mocked)

on:
  push:
    paths:
      - 'smartcampost-frontend/**'
      - '.github/workflows/playwright-e2e.yml'
  pull_request:
    paths:
      - 'smartcampost-frontend/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: smartcampost-frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('smartcampost-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        env:
          NODE_ENV: development
        run: |
          npm ci --prefix smartcampost-frontend

      - name: Install Playwright browsers
        working-directory: smartcampost-frontend
        run: |
          echo "Ensuring Playwright CLI resolves to frontend node_modules (using npx --prefix)"
          npx --yes --prefix=smartcampost-frontend playwright install --with-deps

      - name: Run Playwright e2e (mocked pages)
        working-directory: smartcampost-frontend
        run: |
          echo "Debug: show Node cwd and resolve of @playwright/test"
          node -e "console.log('cwd: '+process.cwd()); try { console.log('resolve:', require.resolve('@playwright/test')); } catch(e) { console.error('resolve-error', e.message); process.exitCode=0 }"
          echo "Run Playwright tests using local playwright binary"
          npx --yes playwright test tests/e2e --config=playwright.config.ts --project=chromium --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: smartcampost-frontend/playwright-report
