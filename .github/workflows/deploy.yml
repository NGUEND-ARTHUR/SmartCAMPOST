name: SmartCAMPOST Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # Triggers on semantic version tags: v1.0.0, v1.1.0 etc.

jobs:
  # ═══════════════════════════════════════════════════════
  #  Build & Push Docker Image to GitHub Container Registry
  # ═══════════════════════════════════════════════════════
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smartcampost-backend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/smartcampost-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.VERSION }}

  # ═══════════════════════════════════════════════════════
  #  Deploy to Render (Backend)
  # ═══════════════════════════════════════════════════════
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -X POST \
            -H "Content-Type: application/json"
        # Set RENDER_DEPLOY_HOOK_URL in GitHub Secrets from:
        # Render Dashboard → Service → Settings → Deploy Hooks

  # ═══════════════════════════════════════════════════════
  #  Build Mobile APK Release
  # ═══════════════════════════════════════════════════════
  build-mobile:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcampost_mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Flutter requirement)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
        if: env.KEYSTORE_BASE64 != ''

      - name: Build release APK
        run: flutter build apk --release --split-per-abi
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            smartcampost_mobile/build/app/outputs/flutter-apk/*.apk

  # ═══════════════════════════════════════════════════════
  #  Create GitHub Release
  # ═══════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-backend, build-mobile]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-apks
          path: ./apks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmartCAMPOST ${{ github.ref_name }}
          body_path: RELEASE_NOTES_v1.0.0.md
          draft: false
          prerelease: false
          files: |
            apks/*.apk
