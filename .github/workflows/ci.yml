name: SmartCAMPOST CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════
  #  Backend — Compile, Test, Security Scan
  # ═══════════════════════════════════════════════════════
  backend:
    name: Backend (Java 21 / Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: smartcampost_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptestpassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: ./mvnw -B compile -DskipTests
        env:
          SMARTCAMPOST_JWT_SECRET: ci-test-secret-32-characters-long!!

      - name: Run tests
        run: ./mvnw -B test
        env:
          SPRING_PROFILES_ACTIVE: local
          SMARTCAMPOST_JWT_SECRET: ci-test-secret-32-characters-long!!
          SMARTCAMPOST_OTP_EXPOSE_CODE: "true"
          RATE_LIMIT_ENABLED: "false"

      - name: Package JAR
        run: ./mvnw -B package -DskipTests
        env:
          SMARTCAMPOST_JWT_SECRET: ci-test-secret-32-characters-long!!

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/backend-*.jar
          retention-days: 7

  # ═══════════════════════════════════════════════════════
  #  Frontend — Type-check, Lint, Build
  # ═══════════════════════════════════════════════════════
  frontend:
    name: Frontend (React / TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcampost-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smartcampost-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: https://smartcampost-backend.onrender.com
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: smartcampost-frontend/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════
  #  Mobile — Flutter analyze
  # ═══════════════════════════════════════════════════════
  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcampost_mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test

  # ═══════════════════════════════════════════════════════
  #  Security — Dependency vulnerability scan
  # ═══════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: NPM audit (frontend)
        run: npm audit --audit-level=high
        working-directory: smartcampost-frontend
        continue-on-error: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven dependency check
        run: ./mvnw -B dependency:tree -q
        working-directory: backend
        env:
          SMARTCAMPOST_JWT_SECRET: ci-test-secret-32-characters-long!!
