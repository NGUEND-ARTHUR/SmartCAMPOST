name: SmartCAMPOST CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  E2E_BASE_URL: http://127.0.0.1:5173
  E2E_API_BASE_URL: http://127.0.0.1:8082
  TEST_ADMIN_PHONE: "+237690000000"
  TEST_ADMIN_PASSWORD: Admin@SmartCAMPOST2026
  TEST_ADMIN_EMAIL: admin@smartcampost.cm
  SMARTCAMPOST_JWT_SECRET: ci-test-secret-32-characters-long!!
  QR_SECRET_KEY: ci-test-qr-secret-32-characters-long

jobs:
  # ═══════════════════════════════════════════════════════
  #  1. Backend — Compile + Unit/Integration Tests
  # ═══════════════════════════════════════════════════════
  backend:
    name: "Backend: Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compile
        run: ./mvnw -B compile -DskipTests
        env:
          SMARTCAMPOST_JWT_SECRET: ${{ env.SMARTCAMPOST_JWT_SECRET }}

      - name: Run unit & integration tests
        run: ./mvnw -B test
        env:
          SPRING_PROFILES_ACTIVE: test
          SMARTCAMPOST_JWT_SECRET: ${{ env.SMARTCAMPOST_JWT_SECRET }}
          SMARTCAMPOST_OTP_EXPOSE_CODE: "true"
          RATE_LIMIT_ENABLED: "false"
          PAYMENT_GATEWAY: mock
          NOTIFICATION_GATEWAY: mock

      - name: Package JAR
        run: ./mvnw -B package -DskipTests
        env:
          SMARTCAMPOST_JWT_SECRET: ${{ env.SMARTCAMPOST_JWT_SECRET }}

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/backend-*.jar
          retention-days: 7

  # ═══════════════════════════════════════════════════════
  #  2. Frontend — TypeScript + ESLint + Build
  # ═══════════════════════════════════════════════════════
  frontend:
    name: "Frontend: Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcampost-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: smartcampost-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit -p .

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Vitest unit tests
        run: npm run test:ui
        continue-on-error: true

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: http://127.0.0.1:8082

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: smartcampost-frontend/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════
  #  3. Mobile — Flutter Analyze + Tests
  # ═══════════════════════════════════════════════════════
  mobile:
    name: "Mobile: Analyze & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcampost_mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code (zero issues)
        run: flutter analyze

      - name: Run widget tests
        run: flutter test
        continue-on-error: true

  # ═══════════════════════════════════════════════════════
  #  4. Playwright E2E — Full end-to-end browser tests
  #     Starts backend + frontend, runs 30 test suites
  # ═══════════════════════════════════════════════════════
  e2e:
    name: "E2E: Playwright"
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: smartcampost-frontend/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install frontend dependencies
        working-directory: smartcampost-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: smartcampost-frontend
        run: npx playwright install --with-deps chromium

      # ── Start Backend ──
      - name: Start backend server
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: local
          PORT: 8082
          PAYMENT_GATEWAY: mock
          NOTIFICATION_GATEWAY: mock
          RATE_LIMIT_ENABLED: "false"
          SMARTCAMPOST_JWT_SECRET: ${{ env.SMARTCAMPOST_JWT_SECRET }}
          QR_SECRET_KEY: ${{ env.QR_SECRET_KEY }}
          SMARTCAMPOST_OTP_EXPOSE_CODE: "true"
          ADMIN_PHONE: ${{ env.TEST_ADMIN_PHONE }}
          ADMIN_PASSWORD: ${{ env.TEST_ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ env.TEST_ADMIN_EMAIL }}
        run: |
          ./mvnw -q -DskipTests spring-boot:run > ../backend.log 2>&1 &
          echo "Waiting for backend..."
          for i in $(seq 1 90); do
            code=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1:8082/actuator/health 2>/dev/null || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "403" ] || [ "$code" = "404" ]; then
              echo "Backend ready (HTTP $code) after $((i*2))s"
              break
            fi
            sleep 2
          done

      # ── Start Frontend ──
      - name: Start frontend dev server
        working-directory: smartcampost-frontend
        env:
          VITE_API_URL: http://127.0.0.1:8082
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > ../frontend.log 2>&1 &
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            code=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1:5173/ 2>/dev/null || echo "000")
            if [ "$code" = "200" ]; then
              echo "Frontend ready after $((i*2))s"
              break
            fi
            sleep 2
          done

      # ── Run E2E Tests ──
      - name: Run Playwright E2E tests
        working-directory: smartcampost-frontend
        env:
          BASE_URL: ${{ env.E2E_BASE_URL }}
          API_URL: ${{ env.E2E_API_BASE_URL }}
        run: npx playwright test --project="Desktop Chrome" --reporter=list
        continue-on-error: true

      # ── Upload Results (always, even on failure) ──
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: smartcampost-frontend/playwright-report/
          retention-days: 30

      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: smartcampost-frontend/test-results/
          retention-days: 14

      - name: Print backend logs on failure
        if: failure()
        run: tail -100 backend.log || true

      - name: Print frontend logs on failure
        if: failure()
        run: tail -50 frontend.log || true

  # ═══════════════════════════════════════════════════════
  #  5. Security — Dependency vulnerability scan
  # ═══════════════════════════════════════════════════════
  security:
    name: "Security: Dependency Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: NPM audit (frontend)
        run: npm audit --audit-level=high
        working-directory: smartcampost-frontend
        continue-on-error: true

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Maven dependency check
        run: ./mvnw -B dependency:tree -q
        working-directory: backend
        env:
          SMARTCAMPOST_JWT_SECRET: ${{ env.SMARTCAMPOST_JWT_SECRET }}
