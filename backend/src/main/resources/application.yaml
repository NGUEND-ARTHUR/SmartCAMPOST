spring:
  application:
    name: smartcampost-backend

  datasource:
    # SECURITY: Use environment variables for database credentials in production
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:${DB_URL:jdbc:mysql://localhost:3306/smartcampost?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=false&serverTimezone=Africa/Douala}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${DB_USERNAME:root}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${DB_PASSWORD:}}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: SmartPool
      # SECURITY: Connection timeout
      connection-timeout: 30000
      # SECURITY: Leak detection
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}  # Use "validate" in production, "update" only in dev
    properties:
      hibernate:
        format_sql: false  # Disable in production
    show-sql: ${SHOW_SQL:false}  # SECURITY: Disable SQL logging in production
    open-in-view: false  # ✅ FIX: Disable OSIV - prevents lazy-loading in view layer, forces explicit @Transactional

  ai:
    openai:
      # SECURITY: API key from environment variable only
      api-key: ${OPENAI_API_KEY:dummy-openai-key-to-prevent-startup-crash}


server:
  port: ${PORT:8080}
  # SECURITY: Error handling
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# SECURITY: MTN Mobile Money credentials from environment variables only
mtn:
  consumer-key: ${MTN_CONSUMER_KEY:}
  consumer-secret: ${MTN_CONSUMER_SECRET:}
  token-url: ${MTN_TOKEN_URL:http://localhost:9200/token}
  init-url: ${MTN_INIT_URL:http://localhost:9200/init}

# Payment gateway selection (fapshi | campay | mtn | orange | mock)
payment:
  gateway: ${PAYMENT_GATEWAY:fapshi}

# Fapshi payment gateway (MTN MoMo + Orange Money — https://fapshi.com)
fapshi:
  api-user: ${FAPSHI_API_USER:}
  api-key: ${FAPSHI_API_KEY:}
  base-url: ${FAPSHI_BASE_URL:https://sandbox.fapshi.com}

# CamPay payment gateway (legacy, optional)
campay:
  app-username: ${CAMPAY_APP_USERNAME:}
  app-password: ${CAMPAY_APP_PASSWORD:}
  permanent-token: ${CAMPAY_PERMANENT_TOKEN:}
  base-url: ${CAMPAY_BASE_URL:https://demo.campay.net}

# Orange Money gateway (legacy, optional)
orange:
  api-key: ${ORANGE_API_KEY:}
  init-url: ${ORANGE_INIT_URL:}
  verify-url: ${ORANGE_VERIFY_URL:}

# CamerPay Mobile Money gateway (legacy, optional)
camerpay:
  api:
    token: ${CAMERPAY_API_TOKEN:}
  hmac:
    secret: ${CAMERPAY_HMAC_SECRET:}
  init-url: ${CAMERPAY_INIT_URL:}
  verify-url: ${CAMERPAY_VERIFY_URL:}
  callback-url: ${CAMERPAY_CALLBACK_URL:}
  return-url: ${CAMERPAY_RETURN_URL:}

# SmartCAMPOST Security Configuration
smartcampost:
  # JWT Configuration - MUST be set in production
  jwt:
    secret: ${SMARTCAMPOST_JWT_SECRET:}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
    refresh-token-days: ${REFRESH_TOKEN_DAYS:7}

  # Google OAuth Configuration
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  # Default Admin Bootstrap - Creates admin on first startup, but ONLY when
  # ADMIN_PHONE and ADMIN_PASSWORD are explicitly set in the environment.
  # SECURITY: these must have no hardcoded fallback here — a non-blank default
  # would make every fresh deployment boot with the same publicly-known admin
  # credentials baked into source control.
  bootstrap:
    default-admin:
      phone: ${ADMIN_PHONE:}
      password: ${ADMIN_PASSWORD:}
      full-name: ${ADMIN_FULLNAME:SmartCAMPOST Administrator}
      email: ${ADMIN_EMAIL:}

  ai:
    system-prompt: ${SMARTCAMPOST_AI_SYSTEM_PROMPT:You are SmartCAMPOST AI, the official intelligent assistant of Cameroon Postal Services. You help users track parcels, understand delivery timelines, resolve issues, manage pickups, payments, and accounts. Be concise, accurate, friendly, and professional. If data is missing, ask clarifying questions. Never hallucinate parcel statuses or user data. When relevant, guide users step-by-step.}
  
  otp:
    # SECURITY: Never expose OTP in production responses
    expose-code-in-response: ${SMARTCAMPOST_OTP_EXPOSE_CODE:false}

  qr:
    # SECURITY: QR secret key from environment variable only
    secret-key: ${QR_SECRET_KEY:}
    max-verifications-per-hour: ${QR_MAX_VERIFICATIONS:100}
    temporary-validity-hours: ${QR_TEMP_VALIDITY_HOURS:48}

  security:
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${RATE_LIMIT_RPM:60}
      auth-requests-per-minute: ${AUTH_RATE_LIMIT_RPM:10}

  selfhealing:
    congestion-threshold: 50
    high-congestion-level: 0.8
    critical-congestion-level: 0.95
    notification-interval-minutes: 30

  ussd:
    session-timeout-minutes: 5
    max-menu-depth: 5

  gps:
    mandatory: true
    max-accuracy-meters: 100

  pricing:
    home-delivery:
      enabled: ${HOME_DELIVERY_SURCHARGE_ENABLED:true}
      per-km-fee-xaf: ${HOME_DELIVERY_PER_KM_FEE_XAF:100}

  automation:
    delayed-parcel:
      interval-ms: ${DELAYED_PARCEL_INTERVAL_MS:900000}
    courier-availability:
      interval-ms: ${COURIER_AVAILABILITY_INTERVAL_MS:300000}
    eta-recalc:
      interval-ms: ${ETA_RECALC_INTERVAL_MS:300000}
    geofence:
      interval-ms: ${GEOFENCE_INTERVAL_MS:120000}
      radius-km: ${GEOFENCE_RADIUS_KM:0.5}
      gps-freshness-minutes: ${GEOFENCE_GPS_FRESHNESS_MINUTES:5}

notification:
  gateway: ${NOTIFICATION_GATEWAY:twilio}

  offline:
    max-queue-size: 100
    auto-sync: true

# SECURITY: Logging configuration for production
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:ERROR}
    org.hibernate.type.descriptor.sql: ERROR
    com.smartcampost: ${APP_LOG_LEVEL:INFO}
  # SECURITY: Don't log sensitive data
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 📖 SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
