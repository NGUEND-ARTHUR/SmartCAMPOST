spring:
  datasource:
    url: jdbc:h2:mem:smartcampost;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: SmartPool

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  # ✅ FIX: Exclude Spring AI OpenAI beans that require API key (not needed for local dev)
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  ai:
    openai:
      api-key: "dummy-local-key-not-used"

# ✅ FIX: JWT secret for local dev
smartcampost:
  jwt:
    secret: local-dev-secret-key-must-be-32-chars-min
    expiration-hours: 8
  bootstrap:
    default-admin:
      phone: ${TEST_ADMIN_PHONE:+237690000000}
      password: ${TEST_ADMIN_PASSWORD:Admin@SmartCAMPOST2026}
      full-name: ${TEST_ADMIN_FULL_NAME:SmartCAMPOST Admin}
      email: ${TEST_ADMIN_EMAIL:admin@smartcampost.cm}
  security:
    lockout:
      enabled: false   # ✅ Disable lockout in local/test profile — prevents test suite lockouts
  otp:
    expose-code-in-response: true  # ✅ Expose OTP in local so tests can read it without SMS

server:
  port: ${PORT:8082}
  error:
    include-message: always
    include-binding-errors: always
