spring:
  datasource:
    url: jdbc:h2:mem:smartcampost;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: SmartPool

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
