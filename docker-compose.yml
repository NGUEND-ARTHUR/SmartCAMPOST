services:
  backend:
    image: eclipse-temurin:21-jre-jammy
    container_name: smartcampost-backend
    volumes:
      - ./backend/target/backend-1.0.0.jar:/app/app.jar
      - ./backend/storage:/app/storage
    working_dir: /app
    command: java -Xms256m -Xmx512m -jar app.jar
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
      PORT: 8082
      SMARTCAMPOST_JWT_SECRET: local-dev-secret-key-must-be-32-chars-min
      SMARTCAMPOST_OTP_EXPOSE_CODE: "true"
      PAYMENT_GATEWAY: mock
      JPA_DDL_AUTO: update
      SMARTCAMPOST_SECURITY_RATE_LIMIT_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
